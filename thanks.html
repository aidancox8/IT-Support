<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Received | Tech Neighbour BC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #1D4ED8;
      --blue-lt:#EFF6FF;
      --blue-dk:#1E3A8A;
      --green:  #059669;
      --green-lt:#ECFDF5;
      --text:   #1F2937;
      --text-sm:#6B7280;
      --border: #E5E7EB;
      --white:  #FFFFFF;
      --radius: 10px;
    }
    body {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      background: var(--blue-lt);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      height: 64px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--blue);
      text-decoration: none;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }
    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .check-circle {
      width: 72px;
      height: 72px;
      background: var(--green-lt);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .check-circle svg { width: 36px; height: 36px; stroke: var(--green); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
    p { color: var(--text-sm); margin-bottom: 12px; font-size: 0.95rem; }
    p:last-of-type { margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--blue);
      color: var(--white);
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--blue-dk); }
    @media (max-width: 560px) { .card { padding: 40px 24px; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <path d="M15 3L2 12.5V27H11V18.5H19V27H28V12.5L15 3Z" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="2" stroke-linejoin="round"/>
        <path d="M12.5 22.5a3.5 3.5 0 0 1 5 0" stroke="#1D4ED8" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M10.5 20.5a6.5 6.5 0 0 1 9 0" stroke="#1D4ED8" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
        <circle cx="15" cy="25" r="1.4" fill="#1D4ED8"/>
      </svg>
      Tech Neighbour BC
    </a>
  </div>
</nav>

<main>
  <div class="card">
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Request received</h1>
    <p>Thanks for reaching out. We've got your message and will get back to you within 24 hours.</p>
    <p>If your issue is urgent, feel free to email us directly at <a href="mailto:techneighbourbc@gmail.com" style="color: var(--blue);">techneighbourbc@gmail.com</a>.</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</main>

</body>
</html>
